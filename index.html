<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Fit Analyzer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
  
  .main { display: flex; flex: 1; overflow: hidden; }
  
  /* LEFT PANEL */
  .left-panel { width: 320px; min-width: 280px; padding: 20px; overflow-y: auto; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; gap: 6px; }
  .left-panel h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }
  
  .axis-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .axis-row .label { width: 90px; font-size: 12px; text-align: right; color: #aaa; flex-shrink: 0; }
  .axis-row .slider-wrap { flex: 1; display: flex; align-items: center; gap: 6px; }
  .axis-row input[type=range] { flex: 1; accent-color: #4a9eff; height: 4px; }
  .axis-row .val { width: 18px; text-align: center; font-size: 13px; font-weight: 600; color: #4a9eff; }
  .axis-row .bucket-btn { width: 28px; height: 22px; border-radius: 4px; border: 1px solid #444; background: transparent; cursor: pointer; font-size: 9px; display: flex; align-items: center; justify-content: center; transition: all .15s; white-space: nowrap; }
  .bucket-btn.b0 { border-color: #4a9eff; background: rgba(74,158,255,.15); color: #4a9eff; }
  .bucket-btn.b1 { border-color: #ffc44a; background: rgba(255,196,74,.15); color: #ffc44a; }
  .bucket-btn.b2 { border-color: #555; background: rgba(85,85,85,.15); color: #666; }
  
  .bucket-legend { display: flex; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #2a2a2a; font-size: 11px; }
  .bucket-legend span { display: flex; align-items: center; gap: 4px; }
  .bucket-legend .dot { width: 8px; height: 8px; border-radius: 2px; }

  /* CENTER PANEL */
  .center-panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; }
  canvas#radar { width: 100%; height: 100%; display: block; }
  
  /* RIGHT PANEL */
  .right-panel { width: 360px; min-width: 300px; padding: 20px; border-left: 1px solid #2a2a2a; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
  .right-panel h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 4px; }
  
  .input-group { display: flex; flex-direction: column; gap: 4px; }
  .input-group label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .5px; }
  .input-group input, .input-group textarea { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 8px 10px; border-radius: 4px; font-size: 13px; font-family: inherit; }
  .input-group input:focus, .input-group textarea:focus { outline: none; border-color: #4a9eff; }
  .input-group textarea { resize: vertical; min-height: 60px; }
  
  .btn { background: #4a9eff; color: #000; border: none; padding: 10px 16px; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
  .btn:hover { background: #6db3ff; }
  .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  
  .history { display: flex; flex-direction: column; gap: 4px; }
  .history-item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; padding: 8px 10px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; transition: border-color .15s; }
  .history-item:hover { border-color: #4a9eff; }
  .history-item .job-info { flex: 1; overflow: hidden; }
  .history-item .job-title { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-item .job-meta { font-size: 10px; color: #666; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-item .fit-score { font-weight: 700; margin-left: 8px; font-size: 14px; }
  .history-item .remove { color: #555; margin-left: 6px; cursor: pointer; }
  .history-item .remove:hover { color: #ff4a4a; }

  .api-config { margin-top: auto; padding-top: 12px; border-top: 1px solid #2a2a2a; }
  .api-config h2 { color: #555; font-size: 12px; }
  .api-config .input-group input { font-size: 12px; padding: 6px 8px; }
</style>
</head>
<body>

<div class="main">
  <!-- LEFT: Axes -->
  <div class="left-panel">
    <h2>Your Values Profile</h2>
    <div id="axes-container"></div>
    <div class="bucket-legend">
      <span><div class="dot" style="background:#4a9eff"></div> Must</span>
      <span><div class="dot" style="background:#ffc44a"></div> Nice</span>
      <span><div class="dot" style="background:#555"></div> Skip</span>
    </div>
  </div>

  <!-- CENTER: Radar -->
  <div class="center-panel">
    <canvas id="radar"></canvas>
  </div>

  <!-- RIGHT: Job analyzer -->
  <div class="right-panel">
    <h2>Job Fit Analyzer</h2>
    <div class="input-group">
      <label>Job Ad URL</label>
      <input type="text" id="job-url" placeholder="https://...">
    </div>
    <div class="input-group">
      <label>Or paste job description</label>
      <textarea id="job-text" rows="4" placeholder="Paste full job description text..."></textarea>
    </div>
    <button class="btn" id="analyze-btn" onclick="analyzeJob()">Analyze Fit</button>
    <div id="status" style="font-size:12px;color:#888;display:none;"></div>
    <div id="history-container">
      <h2 style="margin-top:8px;">Analyzed Jobs</h2>
      <div class="history" id="history-list"></div>
    </div>

    <div class="api-config">
      <h2>LLM API Config</h2>
      <div class="input-group" style="margin-top:6px;">
        <label>API URL</label>
        <input type="text" id="api-url" placeholder="https://api.openai.com/v1/chat/completions">
      </div>
      <div class="input-group" style="margin-top:4px;">
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="sk-...">
      </div>
      <div class="input-group" style="margin-top:4px;">
        <label>Model</label>
        <input type="text" id="api-model" placeholder="gpt-4o-mini" value="gpt-4o-mini">
      </div>
    </div>
  </div>
</div>

<script>
// Aligned with Desert Island Test ranking dimensions
const AXES = [
  { id: 'salary',       label: 'Salary',       low: 'Lowball',      high: 'Premium',     value: 3, bucket: 2 },
  { id: 'growth',       label: 'Tech Growth',  low: 'Stagnant',     high: 'Growing',     value: 3, bucket: 0 },
  { id: 'impact',       label: 'Impact',       low: 'Cog',          high: 'Owner',       value: 3, bucket: 1 },
  { id: 'culture',      label: 'Team Culture', low: 'Toxic',        high: 'Strong Bond', value: 3, bucket: 0 },
  { id: 'autonomy',     label: 'Autonomy',     low: 'Directed',     high: 'Free',        value: 3, bucket: 1 },
  { id: 'mission',      label: 'Mission',      low: 'Apathy',       high: 'Belief',      value: 3, bucket: 1 },
  { id: 'stability',    label: 'Stability',    low: 'Risky',        high: 'Secure',      value: 3, bucket: 0 },
  { id: 'location',     label: 'Location',     low: 'Restricted',   high: 'Flexible',    value: 3, bucket: 0 },
  { id: 'brand',        label: 'Brand',        low: 'Unknown',      high: 'Prestige',    value: 3, bucket: 2 },
  { id: 'management',   label: 'Leadership',   low: 'None',         high: 'Path',        value: 3, bucket: 1 },
];

const BUCKET_LABELS = ['Must', 'Nice', 'Skip'];
const BUCKET_CLASSES = ['b0', 'b1', 'b2'];
const BUCKET_WEIGHTS = [1.0, 0.6, 0.2];

let jobOverlays = [];

const COLORS = ['#ff6b6b','#51cf66','#ffd43b','#cc5de8','#20c997','#ff922b','#339af0','#e64980','#94d82d','#845ef7'];

function save() {
  localStorage.setItem('jfa-axes', JSON.stringify(AXES));
  localStorage.setItem('jfa-jobs', JSON.stringify(jobOverlays));
  localStorage.setItem('jfa-api-url', document.getElementById('api-url').value);
  localStorage.setItem('jfa-api-key', document.getElementById('api-key').value);
  localStorage.setItem('jfa-api-model', document.getElementById('api-model').value);
}

function load() {
  try {
    const saved = JSON.parse(localStorage.getItem('jfa-axes'));
    if (saved) saved.forEach((s,i) => { if (AXES[i]) { AXES[i].value = s.value; AXES[i].bucket = s.bucket; } });
  } catch(e) {}
  try {
    const jobs = JSON.parse(localStorage.getItem('jfa-jobs'));
    if (jobs) jobOverlays = jobs;
  } catch(e) {}
  const au = localStorage.getItem('jfa-api-url');
  const ak = localStorage.getItem('jfa-api-key');
  const am = localStorage.getItem('jfa-api-model');
  if (au !== null) document.getElementById('api-url').value = au;
  if (ak !== null) document.getElementById('api-key').value = ak;
  if (am !== null) document.getElementById('api-model').value = am;
}

function renderAxes() {
  const c = document.getElementById('axes-container');
  c.innerHTML = '';
  AXES.forEach((axis, i) => {
    const row = document.createElement('div');
    row.className = 'axis-row';
    row.innerHTML = `
      <div class="label">${axis.label}</div>
      <div class="slider-wrap">
        <input type="range" min="1" max="5" value="${axis.value}" data-idx="${i}">
        <span class="val">${axis.value}</span>
      </div>
      <button class="bucket-btn ${BUCKET_CLASSES[axis.bucket]}" data-idx="${i}" title="${['Must have','Nice to have','Skip'][axis.bucket]}">${BUCKET_LABELS[axis.bucket]}</button>
    `;
    row.querySelector('input[type=range]').addEventListener('input', e => {
      AXES[i].value = parseInt(e.target.value);
      row.querySelector('.val').textContent = e.target.value;
      save(); draw(); renderHistory();
    });
    row.querySelector('.bucket-btn').addEventListener('click', () => {
      AXES[i].bucket = (AXES[i].bucket + 1) % 3;
      const btn = row.querySelector('.bucket-btn');
      btn.className = 'bucket-btn ' + BUCKET_CLASSES[AXES[i].bucket];
      btn.textContent = BUCKET_LABELS[AXES[i].bucket];
      save(); draw(); renderHistory();
    });
    c.appendChild(row);
  });
}

function resizeCanvas() {
  const canvas = document.getElementById('radar');
  const container = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const w = container.clientWidth;
  const h = container.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.getContext('2d').scale(dpr, dpr);
  draw();
}

function calcFit(job) {
  let totalWeight = 0, totalScore = 0;
  AXES.forEach(axis => {
    const w = BUCKET_WEIGHTS[axis.bucket];
    const diff = Math.abs(axis.value - (job.scores[axis.id] || 3));
    totalWeight += w;
    totalScore += (5 - diff) * w;
  });
  return totalWeight > 0 ? Math.round((totalScore / (5 * totalWeight)) * 100) : 0;
}

function draw() {
  const canvas = document.getElementById('radar');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width / dpr;
  const H = canvas.height / dpr;
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2;
  const R = Math.min(W, H) * 0.35;
  const n = AXES.length;
  
  // Grid rings
  for (let ring = 1; ring <= 5; ring++) {
    const r = (ring / 5) * R;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = ring === 5 ? '#333' : '#1e1e1e';
    ctx.lineWidth = ring === 5 ? 1.5 : 0.5;
    ctx.stroke();
    // Ring number
    if (ring % 2 === 1 || ring === 5) {
      ctx.font = '10px -apple-system, sans-serif';
      ctx.fillStyle = '#444';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ring, cx + 10, cy - r + 2);
    }
  }

  // Axis lines and labels
  const bcolors = ['#4a9eff','#ffc44a','#555'];
  AXES.forEach((axis, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x = cx + R * Math.cos(angle);
    const y = cy + R * Math.sin(angle);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y);
    ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 0.5; ctx.stroke();
    
    const labelR = R + 24;
    const lx = cx + labelR * Math.cos(angle);
    const ly = cy + labelR * Math.sin(angle);
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillStyle = bcolors[axis.bucket];
    ctx.textAlign = Math.abs(Math.cos(angle)) < 0.15 ? 'center' : Math.cos(angle) > 0 ? 'left' : 'right';
    ctx.textBaseline = Math.abs(Math.sin(angle)) < 0.15 ? 'middle' : Math.sin(angle) > 0 ? 'top' : 'bottom';
    ctx.fillText(axis.label, lx, ly);
  });

  function drawPoly(scores, fillColor, strokeColor, lineWidth) {
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const idx = i % n;
      const val = scores[idx] !== undefined ? scores[idx] : 0;
      const angle = (Math.PI * 2 * idx / n) - Math.PI / 2;
      const r = (val / 5) * R;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = fillColor; ctx.fill();
    ctx.strokeStyle = strokeColor; ctx.lineWidth = lineWidth; ctx.stroke();
    for (let i = 0; i < n; i++) {
      const val = scores[i] !== undefined ? scores[i] : 0;
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const r = (val / 5) * R;
      ctx.beginPath();
      ctx.arc(cx + r * Math.cos(angle), cy + r * Math.sin(angle), 3, 0, Math.PI * 2);
      ctx.fillStyle = strokeColor; ctx.fill();
    }
  }

  // Your profile
  drawPoly(AXES.map(a => a.value), 'rgba(74,158,255,0.12)', '#4a9eff', 2);

  // Job overlays
  jobOverlays.forEach((job) => {
    const color = job.color;
    drawPoly(AXES.map(a => job.scores[a.id] || 0), color + '18', color, 1.5);
  });

  // Legend
  ctx.font = 'bold 12px -apple-system, sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#4a9eff';
  ctx.fillText('● Your Profile', 12, 12);
  jobOverlays.forEach((job, idx) => {
    ctx.fillStyle = job.color;
    const name = job.name.length > 25 ? job.name.substring(0, 25) + '…' : job.name;
    const fit = calcFit(job);
    ctx.fillText('● ' + name + ' (' + fit + '%)', 12, 28 + idx * 16);
  });
  ctx.restore();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  jobOverlays.forEach((job, idx) => {
    const fit = calcFit(job);
    const fitColor = fit >= 75 ? '#51cf66' : fit >= 50 ? '#ffd43b' : '#ff6b6b';
    const meta = [job.company, job.location, job.salary].filter(Boolean).join(' · ');
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div class="job-info">
        <div class="job-title" style="color:${job.color}">${job.name}</div>
        ${meta ? '<div class="job-meta">' + meta + '</div>' : ''}
      </div>
      <span class="fit-score" style="color:${fitColor}">${fit}%</span>
      <span class="remove" data-idx="${idx}">✕</span>
    `;
    item.querySelector('.remove').addEventListener('click', e => {
      e.stopPropagation();
      jobOverlays.splice(idx, 1);
      save(); renderHistory(); draw();
    });
    list.appendChild(item);
  });
}

async function analyzeJob() {
  const url = document.getElementById('job-url').value.trim();
  const text = document.getElementById('job-text').value.trim();
  const apiUrl = document.getElementById('api-url').value.trim();
  const apiKey = document.getElementById('api-key').value.trim();
  const model = document.getElementById('api-model').value.trim() || 'gpt-4o-mini';
  
  if (!url && !text) return alert('Enter a job URL or paste a description.');
  if (!apiUrl || !apiKey) return alert('Set your LLM API URL and key first.');
  
  const btn = document.getElementById('analyze-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.style.display = 'block';
  status.textContent = 'Analyzing…';
  
  const axisList = AXES.map(a => `"${a.id}" (${a.label}: ${a.low} → ${a.high})`).join(', ');
  
  const prompt = `You are a job-fit analyst. Analyze this job listing.

Axes (score each 1-5): ${axisList}

Scoring:
- salary: 1=below market, 5=top of market
- growth (Tech Growth): 1=no learning path, 5=strong growth trajectory
- impact: 1=cog in a machine, 5=significant ownership and influence
- culture (Team Culture): 1=red flags/toxic, 5=great team culture signals
- autonomy: 1=micro-managed/rigid, 5=high autonomy/flexible
- mission: 1=no meaningful mission, 5=strong mission you can believe in
- stability: 1=very risky/short-term, 5=very secure/permanent
- location (Location Flexibility): 1=inflexible/restricted, 5=fully flexible
- brand: 1=unknown, 5=top-tier recognizable brand
- management (Leadership): 1=no management path, 5=clear leadership track

Also extract: job title, company name, salary/compensation (as stated), location/flexibility, company size (estimate).

${url ? 'Job URL: ' + url : ''}
${text ? 'Job description:\n' + text : ''}

Respond ONLY with valid JSON, no other text:
{"name":"<concise job title>","company":"<company name>","salary":"<salary as stated>","location":"<location/flexibility>","companySize":"<estimated size>","scores":{"salary":N,"growth":N,"impact":N,"culture":N,"autonomy":N,"mission":N,"stability":N,"location":N,"brand":N,"management":N},"summary":"<one sentence>"}`;

  try {
    const res = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model, messages: [{ role: 'user', content: prompt }], temperature: 0.3 })
    });
    
    if (!res.ok) {
      const err = await res.text();
      throw new Error('API error ' + res.status + ': ' + err.substring(0, 200));
    }
    
    const data = await res.json();
    const content = data.choices?.[0]?.message?.content || data.output?.text || '';
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON in response: ' + content.substring(0, 200));
    
    const parsed = JSON.parse(jsonMatch[0]);
    
    jobOverlays.push({
      name: parsed.name || 'Job ' + (jobOverlays.length + 1),
      company: parsed.company || '',
      salary: parsed.salary || '',
      location: parsed.location || '',
      companySize: parsed.companySize || '',
      scores: parsed.scores,
      color: COLORS[jobOverlays.length % COLORS.length],
      summary: parsed.summary || ''
    });
    
    save();
    renderHistory();
    draw();
    status.textContent = '✓ ' + (parsed.name || 'Job') + ' — ' + (parsed.summary || '');
    status.style.color = '#51cf66';
    document.getElementById('job-url').value = '';
    document.getElementById('job-text').value = '';
  } catch (e) {
    status.textContent = '✗ ' + e.message;
    status.style.color = '#ff6b6b';
  }
  btn.disabled = false;
}

// Init
load();
renderAxes();
renderHistory();
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
</script>
</body>
</html>
