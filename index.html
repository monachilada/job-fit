<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Fit Analyzer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">
  <!-- LEFT: Axes -->
  <div class="left-panel">
    <h2>Your Values Profile</h2>
    <div id="axes-container"></div>
    <div class="bucket-legend">
      <span><div class="dot" style="background:#4a9eff"></div> Must</span>
      <span><div class="dot" style="background:#ffc44a"></div> Nice</span>
      <span><div class="dot" style="background:#555"></div> Skip</span>
    </div>
  </div>

  <!-- CENTER: Radar -->
  <div class="center-panel">
    <canvas id="radar"></canvas>
  </div>

  <!-- RIGHT: Job analyzer -->
  <div class="right-panel">
    <h2>Job Fit Analyzer</h2>
    <div class="input-group">
      <label>Job Ad URL</label>
      <input type="text" id="job-url" placeholder="https://...">
    </div>
    <div class="input-group">
      <label>Or paste job description</label>
      <textarea id="job-text" rows="4" placeholder="Paste full job description text..."></textarea>
    </div>
    <button class="btn" id="analyze-btn" onclick="analyzeJob()">Analyze Fit</button>
    <div id="status" style="font-size:12px;color:#888;display:none;"></div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar"></div>
      <div class="progress-text"></div>
    </div>
    <div id="history-container">
      <h2 style="margin-top:8px;">Analyzed Jobs</h2>
      <div class="history" id="history-list"></div>
    </div>

    <div class="api-config">
      <h2>LLM API Config</h2>
      <div class="input-group" style="margin-top:6px;">
        <label>API URL</label>
        <input type="text" id="api-url" placeholder="https://api.openai.com/v1/chat/completions">
      </div>
      <div class="input-group" style="margin-top:4px;">
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="sk-...">
      </div>
      <div class="input-group" style="margin-top:4px;">
        <label>Model</label>
        <input type="text" id="api-model" placeholder="gpt-4o-mini" value="gpt-4o-mini">
      </div>
      <div class="input-group" style="margin-top:8px;">
        <label>Home Location <span id="home-status" style="color:#555;font-size:10px"></span></label>
        <div style="display:flex;gap:6px;">
          <input type="text" id="home-location" placeholder="e.g. London, UK" style="flex:1">
          <button class="btn" style="padding:6px 10px;font-size:11px;" onclick="detectLocation()">Detect</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
